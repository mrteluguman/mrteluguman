<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrTeluguMan</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap');

body { font-family: 'Inter', sans-serif; background:#ffffff; color:#000; }
h1,h2 { font-family:'Playfair Display', serif; }

.red-line { border-left:4px solid #e11d48; padding-left:16px; transition:0.3s; }
.red-line:hover { border-left:6px solid #e11d48; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="bg-black text-white px-6 py-4 flex justify-between items-center">
  <div class="flex items-center gap-4">
    <img src="logo.jpg" class="w-12 h-12 rounded-full bg-white">
    <h1 class="text-2xl font-bold">MrTeluguMan</h1>
  </div>

  <input id="search" placeholder="Search..." class="hidden md:block px-3 py-1 text-black rounded">
</nav>

<!-- HERO -->
<header class="text-center py-16 bg-black text-white">
  <h1 class="text-3xl md:text-4xl whitespace-nowrap">Truth They Don't Want You To Know</h1>
  <p class="mt-4 text-gray-400">Independent journalism for Telugu people</p>
</header>

<!-- CONTENT -->
<main class="max-w-6xl mx-auto px-6 py-16">

<div class="grid grid-cols-2 gap-6 md:gap-16">

<!-- ANDHRA PRADESH -->
<section>
  <h2 class="text-2xl md:text-3xl font-bold mb-6">Andhra Pradesh</h2>

  <div class="red-line">
    <p class="text-gray-600">Investigations coming soon.</p>
    <div class="mt-4 w-full h-48 md:h-56 bg-gray-200 flex items-center justify-center text-gray-500 text-sm">
      Content Coming Soon
    </div>
  </div>

</section>

<!-- TELANGANA -->
<section>
  <h2 class="text-2xl md:text-3xl font-bold mb-6">Telangana</h2>

  <div class="red-line">
    <p class="text-gray-600">Investigations coming soon.</p>
    <div class="mt-4 w-full h-48 md:h-56 bg-gray-200 flex items-center justify-center text-gray-500 text-sm">
      Content Coming Soon
    </div>
  </div>

</section>

</div>

</main>

<!-- FOOTER -->
<footer class="bg-black text-white py-10">
  <div class="max-w-5xl mx-auto text-center space-y-6">

    <div class="flex justify-center gap-6 text-sm font-medium flex-wrap">
      <a href="https://youtube.com/@mrteluguman" target="_blank" class="hover:underline">YouTube</a>
      <a href="https://instagram.com/mrteluguman" target="_blank" class="hover:underline">Instagram</a>
      <a href="https://x.com/mrteluguman" target="_blank" class="hover:underline">X</a>
      <a href="https://linktr.ee/mrteluguman" target="_blank" class="hover:underline">Linktree</a>
    </div>

    <p class="text-xs text-gray-400">© 2026 MrTeluguMan</p>

  </div>
</footer>

<script>
const search = document.getElementById('search');
search.addEventListener('keyup', function() {
  let value = this.value.toLowerCase();
  document.querySelectorAll('.red-line').forEach(el => {
    el.style.display = el.innerText.toLowerCase().includes(value) ? 'block' : 'none';
  });
});
</script>

</body>
</html>
